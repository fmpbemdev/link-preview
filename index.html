<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO Dinâmico: título e meta description são setados via JS -->
  <title>Oferta Exclusiva 🔥</title>
  <meta name="description" content="Promoção por tempo limitado. Acesse agora!" />

  <!-- Open Graph para preview no Threads / outras redes -->
  <meta property="og:title" content="Oferta Exclusiva 🔥" />
  <meta property="og:description" content="Promoção por tempo limitado. Acesse agora!" />
  <meta property="og:type" content="website" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --neon-tiktok: #69C9D0;
      --neon-tiktok2: #EE1D52;
    }

    * { box-sizing: border-box; }

    body {
      background: #0f0f0f;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Fundo com textura sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(105,201,208,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(238,29,82,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    /* ── Botão base ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
      padding: 1rem 1.5rem;
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .btn:hover  { transform: translateY(-2px) scale(1.02); filter: brightness(1.1); }
    .btn:active { transform: scale(0.98); }

    /* Threads */
    .btn-threads {
      background: #000;
      color: #fff;
      border: 1.5px solid #333;
      box-shadow: 0 0 0 0 transparent;
    }
    .btn-threads:hover { box-shadow: 0 6px 24px rgba(255,255,255,0.12); border-color: #555; }

    /* TikTok */
    .btn-tiktok {
      background: #111;
      color: #fff;
      border: 1.5px solid transparent;
      background-clip: padding-box;
      box-shadow: 0 0 0 1.5px var(--neon-tiktok), 0 0 16px rgba(105,201,208,0.35), inset 0 0 0 1.5px var(--neon-tiktok2);
    }
    .btn-tiktok:hover { box-shadow: 0 0 0 1.5px var(--neon-tiktok), 0 0 28px rgba(105,201,208,0.55), inset 0 0 0 1.5px var(--neon-tiktok2); }

    /* YouTube */
    .btn-youtube {
      background: #FF0000;
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,0,0,0.35);
    }
    .btn-youtube:hover { box-shadow: 0 6px 28px rgba(255,0,0,0.55); }

    /* Instagram */
    .btn-instagram {
      background: linear-gradient(135deg, #F58529 0%, #DD2A7B 40%, #8134AF 70%, #515BD4 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(221,42,123,0.35);
    }
    .btn-instagram:hover { box-shadow: 0 6px 28px rgba(221,42,123,0.55); }

    /* WhatsApp */
    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      box-shadow: 0 4px 20px rgba(37,211,102,0.35);
      animation: pulse-green 2.2s infinite;
    }
    .btn-whatsapp:hover { animation: none; box-shadow: 0 6px 28px rgba(37,211,102,0.6); }

    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0 rgba(37,211,102,0.5); }
      60%  { box-shadow: 0 0 0 10px rgba(37,211,102,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
    }

    /* Ícone SVG inline */
    .icon { width: 22px; height: 22px; flex-shrink: 0; }

    /* Contador regressivo */
    #timer {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #FF0000;
      letter-spacing: 0.05em;
    }

    /* Animação de entrada */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }
    .delay-7 { animation-delay: 0.7s; }
  </style>
</head>

      <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>

    <p class="fade-up delay-7 text-zinc-600 text-xs text-center mt-2">
      🔒 Link seguro &nbsp;·&nbsp; Sem cadastro necessário
    </p>
  </div>

  <script>
    /* ── Configuração ── */
    const BASE_LINK = "https://www.tiktok.com/@mallamjubril1/video/7612303697011330326";

    /* ── Variantes de título por parâmetro ?v= ── */
    const titles = {
      "1": "🔥 Promoção Relâmpago – Só Hoje!",
      "2": "💸 Desconto Exclusivo por Tempo Limitado",
      "3": "🎁 Oferta Especial Para Você",
      "4": "⚡ Últimas Horas – Não Perca!",
      "5": "🛒 Compre Agora com Super Desconto",
      "6": "🏷️ Preço de Fábrica – Por Hoje",
      "7": "💥 Aproveite Antes de Acabar!",
      "8": "🎯 Oferta Exclusiva dos Seguidores",
      "default": "🔥 Vídeo Imperdível"
    };

    /* ── Aplica título dinâmico ── */
    (function applyDynamicTitle() {
      const params = new URLSearchParams(window.location.search);
      const v = params.get("v") || "default";
      const t = titles[v] || titles["default"];

      document.title = t;
      document.getElementById("main-title").textContent = t;
      document.querySelector('meta[property="og:title"]').setAttribute("content", t);
    })();

    /* ── Gera hash aleatório anti-spam ── */
    function randomHash(len = 8) {
      return Math.random().toString(36).substring(2, 2 + len);
    }

    /* ── Handler de clique ── */
    function handleClick(event, el) {
      event.preventDefault();
      if (BASE_LINK === "[COLE SEU LINK DO TIKTOK AQUI]") {
        alert("⚠️ Configure o BASE_LINK no script antes de usar!");
        return;
      }
      const separator = BASE_LINK.includes("?") ? "&" : "?";
      const finalUrl = `${BASE_LINK}${separator}ref=${randomHash()}`;
      window.open(finalUrl, "_blank", "noopener,noreferrer");
    }

    /* ── Contador regressivo (5 minutos por sessão) ── */
    (function startTimer() {
      const KEY = "bridge_timer_end";
      let end = sessionStorage.getItem(KEY);
      if (!end) {
        end = Date.now() + 5 * 60 * 1000;
        sessionStorage.setItem(KEY, end);
      }
      const el = document.getElementById("timer");
      const tick = () => {
        const diff = Math.max(0, end - Date.now());
        const m = String(Math.floor(diff / 60000)).padStart(2, "0");
        const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, "0");
        el.textContent = `${m}:${s}`;
        if (diff > 0) requestAnimationFrame(tick);
        else el.textContent = "00:00";
      };
      tick();
    })();
  </script>
