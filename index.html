<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔥 Vídeo Imperdível</title>
  <meta name="description" content="Vídeo exclusivo publicado pelo Portal Leo Dias no TikTok." />
  <meta property="og:title" content="🔥 Vídeo Imperdível – Portal Leo Dias" />
  <meta property="og:description" content="Vídeo exclusivo no TikTok. Assista agora antes que suma!" />
  <meta property="og:type" content="website" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #FF0026;
      --red2:   #FF4D00;
      --yellow: #FFD600;
      --dark:   #0a0a0a;
      --tk1:    #69C9D0;
      --tk2:    #EE1D52;
    }

    html, body {
      min-height: 100vh;
      background: var(--dark);
      font-family: "DM Sans", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,0,38,.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(255,77,0,.08) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 1rem;
    }

    /* ── CARD ── */
    .card {
      width: 100%; max-width: 780px;
      background: #111;
      border: 2px solid #1e1e1e;
      border-radius: 16px;
      overflow: hidden;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeUp .5s ease .1s both;
    }

    /* ── HEADLINE ── */
    .headline-wrap {
      width: 100%;
      padding: 2.5rem 2.2rem 1.8rem;
      display: flex; flex-direction: column; align-items: center; gap: .6rem;
    }

    .headline {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(3.5rem, 14vw, 6.5rem);
      line-height: .9;
      text-align: center;
      letter-spacing: .03em;
      text-transform: uppercase;
      color: #fff;
    }
    .hl {
      background: linear-gradient(90deg, var(--red), var(--red2), var(--yellow), var(--red2), var(--red));
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:0% center} 100%{background-position:300% center} }

    /* ── IMAGEM BORRADA ── */
    .thumb-wrap {
      width: 100%; position: relative; overflow: hidden;
      height: 360px;
    }
    .thumb-img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: blur(6px) brightness(.55) saturate(1.2);
      transform: scale(1.08);
    }
    .thumb-wrap::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(17,17,17,.6) 0%,
        transparent 30%,
        transparent 70%,
        rgba(17,17,17,.9) 100%
      );
    }
    .thumb-play {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }
    .play-circle {
      width: 82px; height: 82px; border-radius: 50%;
      background: rgba(238,29,82,.85);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(238,29,82,.6);
      animation: playPulse 2s ease-in-out infinite;
    }
    @keyframes playPulse {
      0%,100%{ box-shadow: 0 0 20px rgba(238,29,82,.5); transform: scale(1); }
      50%    { box-shadow: 0 0 40px rgba(238,29,82,.8); transform: scale(1.06); }
    }
    .play-circle svg { width: 32px; height: 32px; margin-left: 5px; }

    /* ── DIVIDER ── */
    .divider { width:100%; height:1px; background: linear-gradient(90deg,transparent,#2a2a2a,transparent); }

    /* ── CTA PRINCIPAL ── */
    .cta-section {
      width: 100%; padding: 2rem 2rem 2.2rem;
      display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
    }
    .cta-wrap { width: 100%; position: relative; }
    .cta-glow {
      position: absolute; inset: -4px; border-radius: 14px;
      background: linear-gradient(135deg, var(--tk2), var(--tk1), var(--tk2));
      background-size: 200% 200%;
      filter: blur(10px); opacity: .65;
      animation: glowPulse 2.5s ease-in-out infinite, gradShift 3s ease infinite;
      z-index: 0;
    }
    @keyframes glowPulse { 0%,100%{opacity:.55;filter:blur(9px)} 50%{opacity:.9;filter:blur(14px)} }
    @keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .cta-btn {
      position: relative; z-index: 1;
      width: 100%; background: #0f0f0f;
      border: 2px solid #2a2a2a; border-radius: 12px;
      padding: 2rem 1.5rem 1.7rem;
      display: flex; flex-direction: column;
      align-items: center; gap: .2rem;
      cursor: pointer; text-decoration: none;
      transition: transform .15s ease;
    }
    .cta-btn:hover  { transform: translateY(-3px); }
    .cta-btn:active { transform: scale(.99); }
    .cta-main {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2rem, 8vw, 3.4rem);
      color: #fff; letter-spacing: .07em; line-height: 1; text-align: center;
    }
    .cta-note {
      margin-top: .4rem; font-size: .7rem; color: #555;
      letter-spacing: .08em; text-transform: uppercase; font-weight: 600;
    }

    .footer-note { font-size:.68rem; color:#333; text-align:center; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="card">

    <!-- HEADLINE -->
    <div class="headline-wrap">
      <h1 class="headline">
        <span class="hl">ASSISTA O VÍDEO:</span>
      </h1>
    </div>

    <!-- FOTO BORRADA -->
    <!-- ⚠️ No arquivo .html baixado, a imagem já está embutida aqui -->
    <div class="thumb-wrap">
      <img class="thumb-img" src="https://img.freepik.com/fotos-premium/uma-imagem-borrada-de-um-fundo-desfocado-com-um-fundo-branco_792836-13411.jpg" alt="Thumbnail do vídeo" />
      <div class="thumb-play" onclick="handleClick(event)" style="cursor:pointer;">
        <div class="play-circle">
          <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-section">
      <div class="cta-wrap">
        <div class="cta-glow"></div>
        <a href="#" class="cta-btn" onclick="handleClick(event)">
          <span class="cta-main">▶ CLIQUE AQUI E ASSISTA.</span>
          <span class="cta-note">Toque para abrir · Grátis · Sem cadastro</span>
        </a>
      </div>

      <div class="divider"></div>
      <p class="footer-note">🔒 Link seguro &nbsp;·&nbsp; Sem cadastro &nbsp;·&nbsp; Acesso gratuito</p>
    </div>
  </div>
</div>

<script>
  // ⚠️ COLE SEU LINK DO TIKTOK AQUI:
  const BASE_LINK = "https://vt.tiktok.com/ZS9RargDNuru2-Rx3Pc/";

  function randomHash(l=10){ return Math.random().toString(36).substring(2,2+l); }

  function handleClick(e){
    e.preventDefault();
    if(BASE_LINK === "[COLE SEU LINK DO TIKTOK AQUI]"){
      alert("⚠️ Configure o BASE_LINK no script antes de usar!");
      return;
    }
    const sep = BASE_LINK.includes("?") ? "&" : "?";
    window.open(BASE_LINK + sep + "ref=" + randomHash(), "_blank", "noopener,noreferrer");
  }

  const titles = {
    "1": "🔥 Leo Dias Revelou Tudo – Assista Agora",
    "2": "😱 Vídeo Exclusivo Leo Dias – Antes que Suma",
    "3": "🚨 Portal Leo Dias: Vídeo Bombástico",
    "4": "⚡ Vídeo Imperdível – Leo Dias no TikTok",
    "default": "🔥 Assista o Vídeo – Portal Leo Dias"
  };

  (function(){
    const v = new URLSearchParams(window.location.search).get("v") || "default";
    const t = titles[v] || titles["default"];
    document.title = t;
    document.querySelector('meta[property="og:title"]').setAttribute("content", t);
  })();
</script>
</body>
</html>
